// Render table
function renderTable(filter) {
  const tbody = document.getElementById('table-body');
  let filtered = customers;
  if (filter === 'high') filtered = customers.filter(c => ['A','B','BA'].includes(c.degree));
  else if (filter === 'today') filtered = customers.filter(c => c.today);
  else if (filter === 'signed') filtered = customers.filter(c => c.status === 'I' || c.status === 'O');
  else if (filter === 'nowebsite') filtered = customers.filter(c => !c.website);

  tbody.innerHTML = filtered.map(c => {
    const degreeClass = c.degree === 'A' ? 'badge-a' : c.degree === 'B' ? 'badge-b' : c.degree === 'BA' ? 'badge-ba' : c.degree === 'C' ? 'badge-c' : c.degree === 'CC' ? 'badge-cc' : c.degree === 'D' ? 'badge-d' : 'badge-new';
    const degreeLabel = c.degree === '-1' ? '新' : c.degree;
    const statusLabel = c.status === 'I' ? '<span class="badge badge-signed">已签</span>' : c.status === 'O' ? '<span class="badge badge-paid">付费</span>' : '';
    const websiteIcon = c.website ? `<span class="tag-website"></span><a href="https://${c.website}" target="_blank" style="color:#2563eb;text-decoration:none;font-size:12px">${c.website.length > 22 ? c.website.slice(0,22)+'...' : c.website}</a>` : '<span class="tag-no-website"></span><span style="color:#94a3b8;font-size:12px">无</span>';
    const todayTag = c.today ? '<span class="today-tag">今日</span>' : '';
    return `<tr data-degree="${c.degree}" data-today="${c.today}" data-status="${c.status}" data-website="${!!c.website}">
      <td>${c.name}${todayTag}</td>
      <td><span class="badge ${degreeClass}">${degreeLabel}</span></td>
      <td>${statusLabel}</td>
      <td>${c.category}</td>
      <td>${websiteIcon}</td>
      <td style="font-size:11px;color:#5b6b85">${c.mst}</td>
      <td style="font-size:11px;color:#5b6b85">${c.created}</td>
    </tr>`;
  }).join('');
}

function filterTable(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTable(type);
}

renderTable('all');

// 1. Degree distribution
const degreeCounts = {};
customers.forEach(c => {
  const d = c.degree === '-1' ? '新(未评级)' : c.degree;
  degreeCounts[d] = (degreeCounts[d] || 0) + 1;
});
const degreeChart = echarts.init(document.getElementById('chart-degree'));
degreeChart.setOption({
  tooltip: { trigger: 'item' },
  color: ['#2563eb','#0d9488','#14b8a6','#d97706','#ea580c','#ef4444','#94a3b8'],
  series: [{
    type: 'pie',
    radius: ['40%', '70%'],
    label: { color: '#1e293b', fontSize: 11 },
    data: Object.entries(degreeCounts).map(([name, value]) => ({ name, value }))
  }]
});

  tooltip: { trigger: 'axis' },
  grid: { left: 80, right: 20, top: 10, bottom: 30 },
  xAxis: { type: 'value', axisLabel: { color: '#5b6b85' }, splitLine: { lineStyle: { color: '#f0f4fa' } } },
  yAxis: { type: 'category', data: sortedIndustry.map(i => i[0]).reverse(), axisLabel: { color: '#1e293b', fontSize: 11 } },
  series: [{
    type: 'bar',
    data: sortedIndustry.map(i => i[1]).reverse(),
    itemStyle: { color: '#2563eb', borderRadius: [0, 4, 4, 0] },
    barWidth: 16
  }]
});

// 3. Timeline
const timelineCounts = {};
customers.forEach(c => {
  const ym = c.created;
  timelineCounts[ym] = (timelineCounts[ym] || 0) + 1;
});
const sortedTimeline = Object.entries(timelineCounts).sort((a,b) => a[0].localeCompare(b[0]));
const timelineChart = echarts.init(document.getElementById('chart-timeline'));
timelineChart.setOption({
  tooltip: { trigger: 'axis' },
  grid: { left: 40, right: 20, top: 10, bottom: 30 },
  xAxis: { type: 'category', data: sortedTimeline.map(t => t[0]), axisLabel: { color: '#5b6b85', fontSize: 10, rotate: 45 }, axisTick: { show: false } },
  yAxis: { type: 'value', axisLabel: { color: '#5b6b85' }, splitLine: { lineStyle: { color: '#f0f4fa' } } },
  series: [{
    type: 'bar',
    data: sortedTimeline.map(t => t[1]),
    itemStyle: { color: '#0d9488', borderRadius: [4, 4, 0, 0] },
    barWidth: 12
  }]
});

window.addEventListener('resize', () => {
  degreeChart.resize();
  industryChart.resize();
  timelineChart.resize();
});
</script>
</body>
</html>
